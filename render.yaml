services:
  - type: web
    name: journal-search-mcp
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: TAVILY_API_KEY
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: MAX_CHARS_PER_DOC
        value: "15000"
      - key: DEFAULT_MAX_CANDIDATES
        value: "5"
      - key: RATE_LIMIT_RPM
        value: "15"
      - key: RATE_LIMIT_TPM
        value: "250000"
      - key: GEMINI_KEY_MAX_WAIT_MS
        value: "90000"
      - key: MCP_API_KEY
        sync: false
      - key: MCP_ICON_URL
        value: https://oqmigmphfdwemlejkhyw.supabase.co/storage/v1/object/public/pageindex-books-test-A-001/Walter_White_S5B.png
